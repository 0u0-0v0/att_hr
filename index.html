<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 4반 출결 관리🍀</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="3-4 출결">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5663/5123119.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { --primary: #ff85a1; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; -webkit-tap-highlight-color: transparent;
        }

        .soft-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 2rem; border: 2px solid white; box-shadow: 0 10px 20px -5px rgba(244, 114, 182, 0.1); }
        .bubble-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 4px solid rgba(0,0,0,0.15); cursor: pointer; }
        .bubble-btn:active { transform: scale(0.96) translateY(2px); border-bottom-width: 1px; }
        
        /* 🖱️ 선택 버튼 스타일 개선 */
        .select-btn { 
            @apply flex-1 py-3 rounded-xl font-bold text-base transition-all border-2; 
            box-shadow: 0 3px 0px rgba(0,0,0,0.03);
            cursor: pointer;
        }
        .select-btn.active { 
            @apply bg-pink-500 text-white border-pink-600 shadow-inner; 
            transform: translateY(1px);
            box-shadow: none;
        }
        .select-btn.inactive { 
            @apply bg-white text-slate-400 border-pink-50;
        }
        
        input, textarea { outline: none !important; -webkit-appearance: none; }
        input::placeholder, textarea::placeholder { font-family: 'OngleipParkDahyeon' !important; opacity: 0.4; }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqkfbtpB_OBD8SrmkICxyeHTWoPXZ4cdpPe9AoyJQNQL7679SxGXh7xYCgu1laEsHA/exec";

        function App() {
            const [appId] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const idFromUrl = urlParams.get('id');
                if (idFromUrl) {
                    localStorage.setItem('saved_attendance_id', idFromUrl);
                    return idFromUrl;
                }
                return localStorage.getItem('saved_attendance_id') || 'default';
            });

            const [view, setView] = useState('checkin');
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '3학년 4반', passcode: '0000',
                formUrl: '', studentIdEntry: '', nameEntry: '', 
                statusEntry: '', typeEntry: '', reasonEntry: '', responseSheetId: ''
            });

            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('지각'); 
            const [type, setType] = useState('질병'); 
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); });
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl || !config.studentIdEntry || !config.nameEntry) {
                    return alert('⚙️ 설정에서 구글 폼 정보를 먼저 입력해주세요!');
                }
                setIsLoading(true);

                try {
                    let actionUrl = config.formUrl.trim().split('?')[0].replace('/viewform', '/formResponse');
                    const params = new URLSearchParams();
                    const toEntry = (num) => `entry.${String(num).replace('entry.', '').trim()}`;

                    params.append(toEntry(config.studentIdEntry), studentId.trim());
                    params.append(toEntry(config.nameEntry), studentName.trim());
                    
                    if(config.statusEntry) params.append(toEntry(config.statusEntry), status);
                    if(config.typeEntry) params.append(toEntry(config.typeEntry), type);
                    if(config.reasonEntry && reason.trim()) params.append(toEntry(config.reasonEntry), reason.trim());

                    await fetch(actionUrl, { method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString()
                    });

                    showToast('success', `${studentName}님, 제출 완료! 🍀`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { alert('전송 중 오류 발생!'); }
                setIsLoading(false);
            };

            const fetchHistory = (e) => {
                e.preventDefault();
                if(!config.responseSheetId) return alert('⚙️ 설정에서 응답 시트 ID를 입력해주세요!');
                setIsLoading(true);
                setHistoryData(null);
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) showToast('error', data.error);
                        else setHistoryData(data.history || []);
                    })
                    .catch(() => showToast('error', '조회 실패!'))
                    .finally(() => setIsLoading(false));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-in slide-in-from-top">
                            <div className={`p-4 rounded-[1.5rem] text-center font-bold text-sm shadow-2xl border-2 ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <header className="px-8 pt-12 pb-4 text-center">
                        <div className="inline-block px-6 py-2 rounded-full bg-white shadow-sm border border-pink-100 mb-3">
                            <h1 className="text-xl font-bold text-[#ff4d6d]">♤ {config.className} ♧</h1>
                        </div>
                    </header>

                    <main className="p-5 flex-grow overflow-y-auto">
                        {view === 'checkin' ? (
                            <div className="space-y-5">
                                <div className="soft-card p-5 text-center">
                                    <div className="text-4xl font-bold text-slate-700 mb-1 tabular-nums font-sans">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                    <div className="text-pink-400 text-[10px] font-bold tracking-widest uppercase">3-4 Attendance System</div>
                                </div>
                                
                                <form onSubmit={handleCheckIn} className="space-y-5">
                                    {/* 1. 학번/성명 한 줄 가로 배치 */}
                                    <div className="flex gap-3">
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg shadow-sm" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg shadow-sm" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>

                                    {/* 2. 출결 상태 (가로 3개 꽉 차게) */}
                                    <div className="space-y-2">
                                        <p className="text-sm font-bold text-pink-500 ml-1">📍 출결 상태</p>
                                        <div className="flex gap-2">
                                            {['지각', '결석', '조퇴'].map(v => (
                                                <button key={v} type="button" onClick={()=>setStatus(v)} className={`select-btn ${status === v ? 'active' : 'inactive'}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 3. 유형 선택 (버튼 형식) */}
                                    <div className="space-y-2">
                                        <p className="text-sm font-bold text-pink-500 ml-1">🏷️ 유형</p>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['질병', '미인정', '기타', '인정'].map(v => (
                                                <button key={v} type="button" onClick={()=>setType(v)} className={`select-btn ${type === v ? 'active' : 'inactive'}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <p className="text-sm font-bold text-pink-500 ml-1">📝 상세 사유</p>
                                        <textarea 
                                            className="w-full p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold min-h-[100px] resize-none shadow-sm text-sm" 
                                            placeholder="ex) 11:40 학교 등교 / 감기로 인한 지각" 
                                            value={reason} 
                                            onChange={e=>setReason(e.target.value)} 
                                        />
                                    </div>
                                    
                                    <button disabled={isLoading} className="bubble-btn w-full bg-[#ff4d6d] text-white font-bold py-4 rounded-2xl shadow-xl text-lg mt-2">
                                        {isLoading ? <span className="loader"></span> : "제출 완료하기!"}
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-[#ff4d6d] text-center">🔍 기록 조회</h2>
                                <form onSubmit={fetchHistory} className="soft-card p-6 space-y-4">
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <button className="w-full bg-[#ff758f] text-white font-bold py-4 rounded-2xl bubble-btn">기록 조회</button>
                                </form>
                                {historyData && (
                                    <div className="space-y-3 pb-10">
                                        {historyData.length > 0 ? historyData.map((h, i) => (
                                            <div key={i} className="soft-card p-5 border-l-8 border-pink-200 flex justify-between items-center">
                                                <div>
                                                    <p className="text-[11px] text-slate-400 font-sans font-bold">{h.date}</p>
                                                    <p className="font-bold text-slate-700">{h.status || "출석"} [{h.type || "일반"}]</p>
                                                    <p className="text-sm text-slate-500 mt-1">{h.reason || "-"}</p>
                                                </div>
                                            </div>
                                        )) : <p className="text-center py-20 font-bold text-slate-400">기록이 없어요!</p>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-5 pb-10">
                                <h2 className="text-lg font-bold text-[#ff4d6d] text-center italic">⚙️ Admin Settings</h2>
                                <form onSubmit={(e)=>{
                                    e.preventDefault(); setIsLoading(true);
                                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...config, id: appId}) })
                                    .then(() => { showToast('success', '저장 완료! ✨'); setView('checkin'); fetchConfig(); })
                                    .catch(() => alert('저장 실패!'))
                                    .finally(() => setIsLoading(false));
                                }} className="soft-card p-6 space-y-4">
                                    <label className="block px-2 text-[10px] font-bold text-slate-400 uppercase">Class Name</label>
                                    <input className="w-full p-3 border-b-2 font-bold text-pink-500" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} />
                                    <label className="block px-2 text-[10px] font-bold text-slate-400 uppercase">Form URL</label>
                                    <input className="w-full p-3 border-b-2 text-[11px] font-sans" value={config.formUrl} onChange={e=>setConfig({...config, formUrl:e.target.value})} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[9px] font-bold text-slate-400">학번 entry</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-slate-400">성명 entry</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-slate-400">상태 entry</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.statusEntry} onChange={e=>setConfig({...config, statusEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-slate-400">유형 entry</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.typeEntry} onChange={e=>setConfig({...config, typeEntry:e.target.value})} /></div>
                                    </div>
                                    <label className="text-[9px] font-bold text-slate-400 block px-2">상세 사유 entry</label>
                                    <input className="w-full p-2 border-b-2 text-xs font-sans" value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} />
                                    <label className="block px-2 text-[10px] font-bold text-slate-400 uppercase">Admin Passcode</label>
                                    <input type="password" title="pass" className="w-full p-3 border-b-2 font-sans" value={config.passcode} onChange={e=>setConfig({...config, passcode:e.target.value})} />
                                    <button disabled={isLoading} className="bubble-btn w-full bg-slate-700 text-white font-bold py-4 rounded-2xl mt-4">저장</button>
                                </form>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-pink-100 flex justify-around p-3 rounded-[3rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center py-2 px-5 ${view==='checkin' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🐾</span><span className="text-[10px] font-bold mt-1">출석</span></button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center py-2 px-5 ${view==='history' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🔍</span><span className="text-[10px] font-bold mt-1">조회</span></button>
                        <button onClick={()=>{
                            const p = prompt('비밀번호를 입력하세요.');
                            if(p === config.passcode){ setView('settings'); }
                            else if(p !== null){ alert('비밀번호가 틀렸습니다.'); }
                        }} className={`flex flex-col items-center py-2 px-5 ${view==='settings' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">⚙️</span><span className="text-[10px] font-bold mt-1">설정</span></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

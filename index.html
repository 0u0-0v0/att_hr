<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 4반 출결관리🍀</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { 
            --primary: #ff4d6d; 
            --primary-dark: #e63958; 
            --baby-pink: #ffd1dc; 
            --baby-pink-dark: #ffb6c1;
            --bg: #fdf2f8; 
        }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
        }

        .soft-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; border: 2px solid white; box-shadow: 0 10px 20px -5px rgba(244, 114, 182, 0.1); }
        
        /* ✨ 복구된 큼직한 베이비 핑크 버튼 */
        .option-btn {
            @apply flex-1 font-bold transition-all text-center flex items-center justify-center py-4 text-xl;
            border-radius: 1.5rem;
            border-bottom: 5px solid var(--baby-pink-dark);
            background-color: var(--baby-pink);
            color: #ff6b81;
        }

        .option-btn.selected {
            @apply bg-gray-400 text-gray-100;
            border-bottom-width: 0px !important;
            transform: translateY(4px);
        }

        /* 🚀 가로를 꽉 채우는 제출 버튼 */
        .btn-giant {
            display: flex; width: 100%; justify-content: center; align-items: center;
            @apply font-bold py-6 rounded-[2.5rem] text-2xl transition-all;
            background-color: var(--primary);
            color: white;
            border-bottom: 7px solid var(--primary-dark);
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
        }
        .btn-giant:active { transform: translateY(4px); border-bottom-width: 1px; }

        input, textarea { width: 100%; border-radius: 1.5rem; padding: 1.25rem; border: 2px solid white; background: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqkfbtpB_OBD8SrmkICxyeHTWoPXZ4cdpPe9AoyJQNQL7679SxGXh7xYCgu1laEsHA/exec";

        function App() {
            const [appId] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id') || localStorage.getItem('saved_attendance_id') || 'default';
            });

            const [view, setView] = useState('checkin');
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [config, setConfig] = useState({
                id: appId, className: '3학년 4반', passcode: '0000',
                formUrl: '', studentIdEntry: '', nameEntry: '', 
                statusEntry: '', typeEntry: '', reasonEntry: '', responseSheetId: ''
            });

            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('지각'); 
            const [type, setType] = useState('질병'); 
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); });
            };

            const handleCheckIn = async (e) => {
                e.preventDefault(); setIsLoading(true);
                try {
                    let actionUrl = config.formUrl.trim().split('?')[0].replace('/viewform', '/formResponse');
                    const params = new URLSearchParams();
                    const toEntry = (n) => `entry.${String(n).replace('entry.', '').trim()}`;
                    params.append(toEntry(config.studentIdEntry), studentId.trim());
                    params.append(toEntry(config.nameEntry), studentName.trim());
                    if(config.statusEntry) params.append(toEntry(config.statusEntry), status);
                    if(config.typeEntry) params.append(toEntry(config.typeEntry), type);
                    if(config.reasonEntry) params.append(toEntry(config.reasonEntry), reason.trim());

                    await fetch(actionUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
                    setMsg({ type: 'success', text: '제출 완료! 🍀' });
                    setTimeout(() => setMsg({ type: '', text: '' }), 3000);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { alert('오류 발생!'); }
                setIsLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-1/4 left-1/2 -translate-x-1/2 z-[200] w-[80%] max-w-xs">
                            <div className="bg-emerald-500 text-white p-6 rounded-3xl text-center font-bold text-xl shadow-2xl animate-bounce">
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <header className="px-6 pt-12 pb-4 text-center">
                        <div className="inline-block px-8 py-3 rounded-full bg-white shadow-sm border border-pink-100">
                            <h1 className="text-2xl font-bold text-[#ff4d6d]">♤ {config.className} ♧</h1>
                        </div>
                    </header>

                    <main className="p-5 flex-grow font-bold overflow-hidden">
                        {view === 'checkin' ? (
                            <div className="space-y-6">
                                <div className="soft-card p-6 text-center text-5xl text-slate-700 tabular-nums">
                                    {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                </div>
                                
                                <form onSubmit={handleCheckIn} className="space-y-6">
                                    <div className="flex gap-4">
                                        <div className="flex-1"><input placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required /></div>
                                        <div className="flex-1"><input placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required /></div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-pink-500 ml-1">📍 출결 상태</p>
                                        <div className="flex gap-3">
                                            {['지각', '결석', '조퇴'].map(v => (
                                                <button key={v} type="button" onClick={()=>setStatus(v)} className={`option-btn ${status === v ? 'selected' : ''}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-pink-500 ml-1">🏷️ 유형 선택</p>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['질병', '미인정', '기타', '인정'].map(v => (
                                                <button key={v} type="button" onClick={()=>setType(v)} className={`option-btn !py-3 !text-base ${type === v ? 'selected' : ''}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <textarea className="min-h-[100px]" placeholder="사유 입력" value={reason} onChange={e=>setReason(e.target.value)} />
                                    <button disabled={isLoading} className="btn-giant">
                                        {isLoading ? "제출 중..." : "제출 완료하기!"}
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6">
                                <h2 className="text-3xl text-[#ff4d6d] text-center">🔍 기록 조회</h2>
                                <form className="soft-card p-6 space-y-4">
                                    <input placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} />
                                    <input placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} />
                                    <button className="btn-giant">조회하기!</button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-5 pb-10">
                                <h2 className="text-2xl text-[#ff4d6d] text-center italic">⚙️ 관리자 설정</h2>
                                <form onSubmit={(e)=>{
                                    e.preventDefault(); setIsLoading(true);
                                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...config, id: appId}) })
                                    .then(() => { setMsg({type:'success', text:'저장 완료!'}); setView('checkin'); })
                                    .finally(() => setIsLoading(false));
                                }} className="soft-card p-6 space-y-4">
                                    <div><label className="text-xs text-slate-400">학급 명칭</label><input className="!p-2 border-b-2" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="text-[10px] text-slate-400">학번 ENTRY</label><input className="!p-2 text-sm" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} /></div>
                                        <div><label className="text-[10px] text-slate-400">성명 ENTRY</label><input className="!p-2 text-sm" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} /></div>
                                        <div><label className="text-[10px] text-slate-400">상태 ENTRY</label><input className="!p-2 text-sm" value={config.statusEntry} onChange={e=>setConfig({...config, statusEntry:e.target.value})} /></div>
                                        <div><label className="text-[10px] text-slate-400">유형 ENTRY</label><input className="!p-2 text-sm" value={config.typeEntry} onChange={e=>setConfig({...config, typeEntry:e.target.value})} /></div>
                                    </div>
                                    <div><label className="text-xs text-slate-400">사유 ENTRY</label><input className="!p-2 text-sm" value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} /></div>
                                    <button disabled={isLoading} className="btn-giant !bg-slate-700 !border-slate-800">설정 저장!</button>
                                </form>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-pink-100 flex justify-around p-3 rounded-[3rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center px-5 ${view==='checkin' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-3xl">🐾</span><span className="text-xs font-bold">출석</span></button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center px-5 ${view==='history' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-3xl">🔍</span><span className="text-xs font-bold">조회</span></button>
                        <button onClick={()=>{ const p = prompt('비번'); if(p === config.passcode) setView('settings'); }} className={`flex flex-col items-center px-5 ${view==='settings' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-3xl">⚙️</span><span className="text-xs font-bold">설정</span></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

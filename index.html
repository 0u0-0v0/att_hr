<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 4반 출결관리🍀</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { 
            --primary: #ff4d6d; /* 메인 버튼용 진한 핑크 */
            --primary-light: #ff8fa3; /* 선택 버튼용 연한 핑크 */
            --primary-dark: #e63958; 
            --bg: #fdf2f8; 
        }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.01em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; -webkit-tap-highlight-color: transparent;
        }

        .soft-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; border: 2px solid white; box-shadow: 0 10px 20px -5px rgba(244, 114, 182, 0.1); }
        
        /* 🎨 연한 핑크 양각 선택 버튼 */
        .btn-selection {
            @apply flex-1 font-bold transition-all text-center flex items-center justify-center py-4 text-lg;
            border-radius: 1.5rem;
            border-bottom: 5px solid #ff708a;
            background-color: var(--primary-light);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 🔘 선택 시 회색 음각 효과 */
        .btn-selected {
            @apply bg-gray-400 text-gray-100 shadow-inner;
            border-bottom-width: 0px !important;
            transform: translateY(5px);
            border-color: #9ca3af !important;
        }

        /* 🚀 큼직한 메인 액션 버튼 (제출/조회) */
        .btn-main-large {
            @apply w-full font-bold py-5 rounded-[2.5rem] text-xl transition-all flex items-center justify-center;
            background-color: var(--primary);
            color: white;
            border-bottom: 6px solid var(--primary-dark);
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
            display: flex !important; /* 크기 찌그러짐 방지 */
            min-height: 70px;
        }
        .btn-main-large:active {
            transform: translateY(4px);
            border-bottom-width: 1px;
        }
        
        input, textarea { outline: none !important; -webkit-appearance: none; }
        textarea::placeholder { opacity: 0.5; font-style: italic; }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqkfbtpB_OBD8SrmkICxyeHTWoPXZ4cdpPe9AoyJQNQL7679SxGXh7xYCgu1laEsHA/exec";

        function App() {
            const [appId] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id') || localStorage.getItem('saved_attendance_id') || 'default';
            });

            const [view, setView] = useState('checkin');
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '3학년 4반', passcode: '0000',
                formUrl: '', studentIdEntry: '', nameEntry: '', 
                statusEntry: '', typeEntry: '', reasonEntry: '', responseSheetId: ''
            });

            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('정상등교'); 
            const [type, setType] = useState('질병'); 
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); });
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    let actionUrl = config.formUrl.trim().split('?')[0].replace('/viewform', '/formResponse');
                    const params = new URLSearchParams();
                    const toEntry = (n) => `entry.${String(n).replace('entry.', '').trim()}`;
                    
                    params.append(toEntry(config.studentIdEntry), studentId.trim());
                    params.append(toEntry(config.nameEntry), studentName.trim());
                    if(config.statusEntry) params.append(toEntry(config.statusEntry), status);
                    if(config.typeEntry) params.append(toEntry(config.typeEntry), type);
                    if(config.reasonEntry && reason.trim()) params.append(toEntry(config.reasonEntry), reason.trim());

                    await fetch(actionUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
                    showToast('success', `${studentName}님 제출 완료! 🍀`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { alert('오류 발생!'); }
                setIsLoading(false);
            };

            const fetchHistory = (e) => {
                e.preventDefault();
                setIsLoading(true); setHistoryData(null);
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}`)
                    .then(res => res.json())
                    .then(data => data.error ? showToast('error', data.error) : setHistoryData(data.history || []))
                    .catch(() => showToast('error', '조회 실패!'))
                    .finally(() => setIsLoading(false));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-bounce">
                            <div className={`p-4 rounded-2xl text-center font-bold text-sm shadow-xl ${msg.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <header className="px-8 pt-10 pb-4 text-center">
                        <div className="inline-block px-6 py-2 rounded-full bg-white shadow-sm border border-pink-100 mb-2">
                            <h1 className="text-xl font-bold text-[#ff4d6d]">♤ {config.className} ♧</h1>
                        </div>
                    </header>

                    <main className="p-5 flex-grow overflow-y-auto">
                        {view === 'checkin' ? (
                            <div className="space-y-6">
                                <div className="soft-card p-5 text-center">
                                    <div className="text-4xl font-bold text-slate-700 tabular-nums">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                </div>
                                
                                <form onSubmit={handleCheckIn} className="space-y-6">
                                    <div className="flex gap-3">
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-sm font-bold text-pink-500 ml-1">📍 출결 상태 선택</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {['정상등교', '지각', '결석', '조퇴'].map(v => (
                                                <button key={v} type="button" onClick={()=>setStatus(v)} 
                                                className={`btn-selection ${status === v ? 'btn-selected' : ''}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-sm font-bold text-pink-500 ml-1">🏷️ 유형 선택</p>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['질병', '미인정', '기타', '인정'].map(v => (
                                                <button key={v} type="button" onClick={()=>setType(v)} 
                                                className={`btn-selection !py-3 !text-sm ${type === v ? 'btn-selected' : ''}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <textarea className="w-full p-4 rounded-2xl border-2 border-white bg-white/80 min-h-[100px] font-bold text-sm shadow-sm" placeholder="ex) 11:40 등교 / 감기로 인한 지각" value={reason} onChange={e=>setReason(e.target.value)} />
                                    
                                    <button disabled={isLoading} className="btn-main-large">
                                        {isLoading ? <span className="loader"></span> : "제출 완료하기!"}
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-[#ff4d6d] text-center">🔍 기록 조회</h2>
                                <form onSubmit={fetchHistory} className="soft-card p-6 space-y-4">
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold shadow-sm" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 font-bold shadow-sm" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <button className="btn-main-large">기록 조회하기</button>
                                </form>
                                {historyData && (
                                    <div className="space-y-3 pb-10">
                                        {historyData.length > 0 ? historyData.map((h, i) => (
                                            <div key={i} className="soft-card p-5 border-l-8 border-pink-400">
                                                <p className="text-[10px] text-slate-400 font-sans font-bold">{h.date}</p>
                                                <p className="font-bold text-slate-700">{h.status || "정상"} [{h.type || "일반"}]</p>
                                                <p className="text-xs text-slate-500 mt-1">{h.reason || "-"}</p>
                                            </div>
                                        )) : <p className="text-center py-20 font-bold text-slate-400">기록이 없어요!</p>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-5 pb-10">
                                <h2 className="text-lg font-bold text-[#ff4d6d] text-center italic">⚙️ Admin Settings</h2>
                                <form onSubmit={(e)=>{
                                    e.preventDefault(); setIsLoading(true);
                                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...config, id: appId}) })
                                    .then(() => { showToast('success', '저장 완료! ✨'); setView('checkin'); fetchConfig(); })
                                    .catch(() => alert('저장 실패!'))
                                    .finally(() => setIsLoading(false));
                                }} className="soft-card p-6 space-y-3">
                                    <div><label className="text-[10px] font-bold text-slate-400">학급 명칭</label>
                                    <input className="w-full p-2 border-b-2 font-bold text-pink-500" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} /></div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[9px] font-bold text-slate-400">학번 ENTRY</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-slate-400">성명 ENTRY</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-pink-500">상태 ENTRY</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.statusEntry} onChange={e=>setConfig({...config, statusEntry:e.target.value})} /></div>
                                        <div><label className="text-[9px] font-bold text-pink-500">유형 ENTRY</label><input className="w-full p-2 border-b-2 text-xs font-sans" value={config.typeEntry} onChange={e=>setConfig({...config, typeEntry:e.target.value})} /></div>
                                    </div>
                                    
                                    <div><label className="text-[9px] font-bold text-slate-400">사유 ENTRY</label>
                                    <input className="w-full p-2 border-b-2 text-xs font-sans" value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} /></div>
                                    
                                    <button disabled={isLoading} className="btn-main-large !bg-slate-700 !border-slate-800 !text-lg mt-4">설정 저장</button>
                                </form>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-pink-100 flex justify-around p-3 rounded-[3rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center py-2 px-5 ${view==='checkin' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🐾</span><span className="text-[10px] font-bold mt-1">출석</span></button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center py-2 px-5 ${view==='history' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🔍</span><span className="text-[10px] font-bold mt-1">조회</span></button>
                        <button onClick={()=>{
                            const p = prompt('비밀번호를 입력하세요.');
                            if(p === config.passcode) setView('settings');
                            else if(p !== null) alert('틀렸습니다!');
                        }} className={`flex flex-col items-center py-2 px-5 ${view==='settings' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">⚙️</span><span className="text-[10px] font-bold mt-1">설정</span></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

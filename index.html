<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3학년 4반 출결 관리🍀</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="3-4 출결">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5663/5123119.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { --primary: #ff4d6d; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; -webkit-tap-highlight-color: transparent;
        }

        .soft-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 2rem; border: 2px solid white; box-shadow: 0 10px 20px -5px rgba(244, 114, 182, 0.1); }
        
        /* ✨ [핵심] 제출 버튼 스타일을 본뜬 선택 버튼 디자인 */
        .option-btn { 
            @apply flex-1 py-4 rounded-2xl font-bold text-lg transition-all border-b-4 active:scale-95; 
            cursor: pointer;
        }
        /* 미선택 상태: 하단 버튼처럼 핑크색 */
        .option-btn.inactive { 
            @apply bg-[#ff4d6d] text-white border-[#e63958] shadow-lg;
        }
        /* 선택 상태: 회색으로 변하며 꾹 눌림 */
        .option-btn.active { 
            @apply bg-gray-400 text-gray-100 border-gray-500 shadow-inner;
            transform: translateY(2px);
            border-bottom-width: 0px;
        }
        
        input, textarea { outline: none !important; -webkit-appearance: none; }
        input::placeholder, textarea::placeholder { font-family: 'OngleipParkDahyeon' !important; opacity: 0.4; }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqkfbtpB_OBD8SrmkICxyeHTWoPXZ4cdpPe9AoyJQNQL7679SxGXh7xYCgu1laEsHA/exec";

        function App() {
            const [appId] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id') || localStorage.getItem('saved_attendance_id') || 'default';
            });

            const [view, setView] = useState('checkin');
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '3학년 4반', passcode: '0000',
                formUrl: '', studentIdEntry: '', nameEntry: '', 
                statusEntry: '', typeEntry: '', reasonEntry: '', responseSheetId: ''
            });

            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('정상등교'); 
            const [type, setType] = useState('질병'); 
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); });
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    let actionUrl = config.formUrl.trim().split('?')[0].replace('/viewform', '/formResponse');
                    const params = new URLSearchParams();
                    const toEntry = (num) => `entry.${String(num).replace('entry.', '').trim()}`;

                    params.append(toEntry(config.studentIdEntry), studentId.trim());
                    params.append(toEntry(config.nameEntry), studentName.trim());
                    if(config.statusEntry) params.append(toEntry(config.statusEntry), status);
                    if(config.typeEntry) params.append(toEntry(config.typeEntry), type);
                    if(config.reasonEntry && reason.trim()) params.append(toEntry(config.reasonEntry), reason.trim());

                    await fetch(actionUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
                    showToast('success', `${studentName}님, 제출 완료! 🍀`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { alert('오류 발생!'); }
                setIsLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-bounce">
                            <div className={`p-4 rounded-2xl text-center font-bold text-sm shadow-xl ${msg.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                {msg.text}
                            </div>
                        </div>
                    )}

                    <header className="px-8 pt-12 pb-4 text-center">
                        <div className="inline-block px-6 py-2 rounded-full bg-white shadow-sm border border-pink-100 mb-2">
                            <h1 className="text-xl font-bold text-[#ff4d6d]">♤ {config.className} ♧</h1>
                        </div>
                    </header>

                    <main className="p-5 flex-grow overflow-y-auto">
                        {view === 'checkin' && (
                            <div className="space-y-6">
                                <div className="soft-card p-5 text-center">
                                    <div className="text-4xl font-bold text-slate-700 tabular-nums">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                </div>
                                
                                <form onSubmit={handleCheckIn} className="space-y-6">
                                    <div className="flex gap-3">
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                        <input className="flex-1 p-4 rounded-2xl border-2 border-white bg-white/80 focus:border-pink-300 font-bold text-lg" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-sm font-bold text-pink-500 ml-1">📍 출결 상태 선택</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {['정상등교', '지각', '결석', '조퇴'].map(v => (
                                                <button key={v} type="button" onClick={()=>setStatus(v)} 
                                                className={`option-btn ${status === v ? 'active' : 'inactive'}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-sm font-bold text-pink-500 ml-1">🏷️ 유형 선택</p>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['질병', '미인정', '기타', '인정'].map(v => (
                                                <button key={v} type="button" onClick={()=>setType(v)} 
                                                className={`option-btn ${type === v ? 'active' : 'inactive'} !text-sm !py-3`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <textarea className="w-full p-4 rounded-2xl border-2 border-white bg-white/80 min-h-[100px] font-bold text-sm shadow-sm" placeholder="ex) 11:40 학교 등교 / 감기로 인한 지각" value={reason} onChange={e=>setReason(e.target.value)} />
                                    
                                    <button disabled={isLoading} className="w-full bg-[#ff4d6d] text-white font-bold py-5 rounded-2xl shadow-xl text-xl border-b-4 border-[#e63958] active:border-b-0 active:translate-y-1 transition-all">
                                        {isLoading ? <span className="loader"></span> : "제출 완료하기!"}
                                    </button>
                                </form>
                            </div>
                        )}
                        {/* 설정 및 조회 뷰 생략 (기존 유지) */}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-sm bg-white/90 backdrop-blur-xl border border-pink-100 flex justify-around p-3 rounded-[3rem] shadow-2xl">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center py-2 px-5 ${view==='checkin' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🐾</span><span className="text-[10px] font-bold">출석</span></button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center py-2 px-5 ${view==='history' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">🔍</span><span className="text-[10px] font-bold">조회</span></button>
                        <button onClick={()=>{const p = prompt('비밀번호'); if(p === config.passcode) setView('settings');}} className={`flex flex-col items-center py-2 px-5 ${view==='settings' ? 'text-[#ff4d6d]' : 'text-slate-300'}`}><span className="text-2xl">⚙️</span><span className="text-[10px] font-bold">설정</span></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
